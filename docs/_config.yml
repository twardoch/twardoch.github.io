title: Adam Twardoch
description: >-
  Adam Twardoch — notes and projects on type design, font technology,
  OpenType, variable fonts and Unicode.
url: https://code.twardoch.com

# Pull the theme from the upstream repo at a pinned tag.
# Bump this to upgrade Just the Docs.
remote_theme: just-the-docs/just-the-docs@v0.12.0

# Light or dark colour scheme: "light" or "dark"
color_scheme: light

# Search across the site
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Aux nav links (top right of every page)
aux_links:
  GitHub: https://github.com/twardoch
  "@adamtwar": https://twitter.com/adamtwar
aux_links_new_tab: true

# Footer
footer_content: >-
  &copy; 2026 Adam Twardoch. Built with
  <a href="https://just-the-docs.com">Just the Docs</a>.
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"
gh_edit_link: true
gh_edit_link_text: Edit this page on GitHub
gh_edit_repository: https://github.com/twardoch/twardoch.github.io
gh_edit_branch: master
gh_edit_source: docs
gh_edit_view_mode: tree

plugins:
  - jekyll-remote-theme       # remote_theme: ... loader
  - jekyll-seo-tag            # <head> SEO/OG/Twitter/JSON-LD
  - jekyll-sitemap            # /sitemap.xml
  - jekyll-feed               # /feed.xml Atom feed
  - jekyll-redirect-from      # per-page redirect_from: front matter
  - jekyll-include-cache      # speeds up theme {% include %} calls
  - jekyll-mentions           # auto-link @username → GitHub
  - jemoji                    # :emoji: shortcodes → images

# Atom feed metadata (jekyll-feed)
author:
  name: Adam Twardoch
  email: adam+github@twardoch.com

# Markdown / syntax highlighting
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Permalinks (pretty URLs without .html)
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/
  - .bundle/
  - .jekyll-cache/
